<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#FF6B6B" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="KPI分析" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <title>KPI分析</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { background: #f7f8fc; font-family: 'Hiragino Sans', 'Noto Sans JP', sans-serif; }
    #root { max-width: 480px; margin: 0 auto; min-height: 100vh; }
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.12.7/Recharts.min.js"></script>
  <script>
    const { useState, useEffect } = React;
    const { LineChart, Line, XAxis, YAxis, CartesianGrid, Tooltip, Legend, ResponsiveContainer } = Recharts;
    const ITEMS = [
      { key: "pinpon", label: "ピンポン" },
      { key: "outAri", label: "アウトあり" },
      { key: "taiousu", label: "対応数" },
      { key: "chigau", label: "違うの使ってる" },
      { key: "taimensu", label: "対面数" },
      { key: "tetsuduki", label: "手続きめんどくさい" },
      { key: "set", label: "セット" },
      { key: "mishiyo", label: "未使用" },
      { key: "teiansu", label: "提案数" },
      { key: "apo", label: "あぽ" },
      { key: "atokaku", label: "後確数" },
    ];
    const COLORS = {
      pinpon: "#FF6B6B", outAri: "#FF8E53", taiousu: "#FFC300",
      chigau: "#A8E063", taimensu: "#56CCF2", tetsuduki: "#6C63FF",
      set: "#F72585", mishiyo: "#4CC9F0", teiansu: "#7BF1A8",
      apo: "#FFD166", atokaku: "#EF476F",
    };
    const KPI_KEYS = ["pinpon","taiousu","taimensu","teiansu","atokaku"];
    function getTodayStr() { return new Date().toISOString().slice(0, 10); }
    function formatDate(str) { const d = new Date(str); return `${d.getMonth()+1}/${d.getDate()}`; }
    function App() {
      const [view, setView] = useState("input");
      const [today, setToday] = useState(getTodayStr());
      const [counts, setCounts] = useState(() => { const o={}; ITEMS.forEach(i=>o[i.key]=0); return o; });
      const [records, setRecords] = useState([]);
      const [saved, setSaved] = useState(false);
      const [graphItem, setGraphItem] = useState("pinpon");
      const [loading, setLoading] = useState(true);
      useEffect(() => {
        try { const r = localStorage.getItem("kpi_records"); if (r) setRecords(JSON.parse(r)); } catch {}
        setLoading(false);
      }, []);
      useEffect(() => {
        const existing = records.find(r => r.date === today);
        if (existing) { setCounts({...existing.counts}); setSaved(true); }
        else { const o={}; ITEMS.forEach(i=>o[i.key]=0); setCounts(o); setSaved(false); }
      }, [today, records]);
      function saveRecord() {
        const updated = records.filter(r => r.date !== today);
        updated.push({ date: today, counts: {...counts} });
        updated.sort((a,b) => a.date.localeCompare(b.date));
        setRecords(updated);
        localStorage.setItem("kpi_records", JSON.stringify(updated));
        setSaved(true);
      }
      function deleteRecord(date) {
        const updated = records.filter(r => r.date !== date);
        setRecords(updated);
        localStorage.setItem("kpi_records", JSON.stringify(updated));
      }
      const total = Object.values(counts).reduce((a,b)=>a+b,0);
      const graphData = records.map(r => ({ date: formatDate(r.date), value: r.counts[graphItem]||0 }));
      const avgData = ITEMS.map(item => {
        const vals = records.map(r => r.counts[item.key]||0);
        return { ...item, avg: vals.length ? parseFloat((vals.reduce((a,b)=>a+b,0)/vals.length).toFixed(1)) : 0 };
      });
      const s = styles;
      if (loading) return React.createElement("div", {style:s.loading});
      return React.createElement("div", {style:s.app},
        React.createElement("div", {style:s.header},
          React.createElement("div", {style:s.headerTitle}, "KPI分析"),
          React.createElement("div", {style:s.tabs},
            [["input","入力"],["graph","グラフ"],["history","履歴"]].map(([v,l]) =>
              React.createElement("button", { key:v, onClick:()=>setView(v), style: view===v ? s.tabActive : s.tab }, l)
            )
          )
        ),
        view==="input" && React.createElement("div", {style:s.content},
          React.createElement("div", {style:s.dateRow},
            React.createElement("button", {style:s.arrowBtn, onClick:()=>{ const d=new Date(today); d.setDate(d.getDate()-1); setToday(d.toISOString().slice(0,10)); }}, "‹"),
            React.createElement("input", {type:"date", value:today, onChange:e=>setToday(e.target.value), style:s.dateInput}),
            React.createElement("button", {style:s.arrowBtn, onClick:()=>{ const d=new Date(today); d.setDate(d.getDate()+1); setToday(d.toISOString().slice(0,10)); }}, "›")
          ),
          React.createElement("div", {style:s.totalBadge}, "合計 ", React.createElement("span", {style:s.totalNum}, total)),
          React.createElement("div", {style:s.grid},
            ITEMS.map(item =>
              React.createElement("div", {key:item.key, style:s.card},
                React.createElement("div", {style:{...s.cardAccent, background:COLORS[item.key]}}),
                React.createElement("input", {
                  type:"number", min:"0",
                  value: counts[item.key]===0 ? "" : counts[item.key],
                  placeholder:"0",
                  onChange: e => {
                    const v = e.target.value==="" ? 0 : Math.max(0, parseInt(e.target.value)||0);
                    setCounts(c=>({...c,[item.key]:v})); setSaved(false);
                  },
                  style:{...s.cardCountInput, borderBottom:`3px solid ${COLORS[item.key]}`}
                }),
                React.createElement("div", {style:s.cardLabel}, item.label)
              )
            )
          ),
          React.createElement("div", {style:s.actionRow},
            React.createElement("button", {style:s.resetBtn, onClick:()=>{ const o={}; ITEMS.forEach(i=>o[i.key]=0); setCounts(o); setSaved(false); }}, "リセット"),
            React.createElement("button", {style:s.saveBtn, onClick:saveRecord}, saved ? "✓ 保存済み" : "保存する")
          )
        ),
        view==="graph" && React.createElement("div", {style:s.content},
          React.createElement("div", {style:s.sectionTitle}, "📈 全項目まとめグラフ"),
          records.length < 2
            ? React.createElement("div", {style:s.emptyMsg}, "データが2日分以上になるとグラフが表示されます📊")
            : React.createElement("div", {style:s.chartWrap},
                React.createElement(ResponsiveContainer, {width:"100%", height:280},
                  React.createElement(LineChart, {
                    data: records.map(r => { const d={date:formatDate(r.date)}; ITEMS.forEach(i=>d[i.key]=r.counts[i.key]||0); return d; }),
                    margin:{top:8,right:16,left:-10,bottom:0}
                  },
                    React.createElement(CartesianGrid, {strokeDasharray:"3 3", stroke:"#eee"}),
                    React.createElement(XAxis, {dataKey:"date", tick:{fontSize:10}}),
                    React.createElement(YAxis, {tick:{fontSize:10}, allowDecimals:false}),
                    React.createElement(Tooltip, {contentStyle:{borderRadius:10,border:"none",boxShadow:"0 4px 20px rgba(0,0,0,0.1)",fontSize:11}}),
                    React.createElement(Legend, {wrapperStyle:{fontSize:10,paddingTop:8}}),
                    ...ITEMS.filter(i=>KPI_KEYS.includes(i.key)).map(item =>
                      React.createElement(Line, {key:item.key, type:"monotone", dataKey:item.key, name:item.label, stroke:COLORS[item.key], strokeWidth:2, dot:false})
                    )
                  )
                )
              ),
          React.createElement("div", {style:s.sectionTitle}, "🔍 個別推移グラフ"),
          React.createElement("div", {style:s.itemSelector},
            ITEMS.filter(i=>KPI_KEYS.includes(i.key)).map(item =>
              React.createElement("button", {
                key:item.key, onClick:()=>setGraphItem(item.key),
                style:{...s.itemChip, background:graphItem===item.key?COLORS[item.key]:"#f0f0f0", color:graphItem===item.key?"#fff":"#555"}
              }, item.label)
            )
          ),
          records.length < 2
            ? React.createElement("div", {style:s.emptyMsg}, "データが2日分以上になるとグラフが表示されます📊")
            : React.createElement("div", {style:s.chartWrap},
                React.createElement(ResponsiveContainer, {width:"100%", height:220},
                  React.createElement(LineChart, {data:graphData, margin:{top:8,right:16,left:-10,bottom:0}},
                    React.createElement(CartesianGrid, {strokeDasharray:"3 3", stroke:"#eee"}),
                    React.createElement(XAxis, {dataKey:"date", tick:{fontSize:11}}),
                    React.createElement(YAxis, {tick:{fontSize:11}, allowDecimals:false}),
                    React.createElement(Tooltip, {contentStyle:{borderRadius:10,border:"none",boxShadow:"0 4px 20px rgba(0,0,0,0.1)"}, formatter:v=>[v, ITEMS.find(i=>i.key===graphItem)?.label]}),
                    React.createElement(Line, {type:"monotone", dataKey:"value", stroke:COLORS[graphItem], strokeWidth:3, dot:{r:5,fill:COLORS[graphItem]}, activeDot:{r:7}})
                  )
                )
              ),
          React.createElement("div", {style:s.sectionTitle}, `平均一覧（${records.length}日分）`),
          React.createElement("div", {style:s.avgGrid},
            avgData.map(d =>
              React.createElement("div", {key:d.key, style:s.avgCard},
                React.createElement("div", {style:{...s.avgBar, background:COLORS[d.key], width:`${Math.min(d.avg/20*100,100)}%`}}),
                React.createElement("div", {style:s.avgLabel}, d.label),
                React.createElement("div", {style:{...s.avgNum, color:COLORS[d.key]}}, d.avg)
              )
            )
          )
        ),
        view==="history" && React.createElement("div", {style:s.content},
          React.createElement("div", {style:s.sectionTitle}, `記録履歴（${records.length}日分）`),
          records.length===0 && React.createElement("div", {style:s.emptyMsg}, "まだ記録がありません"),
          ...[...records].reverse().map(r =>
            React.createElement("div", {key:r.date, style:s.histCard},
              React.createElement("div", {style:s.histHeader},
                React.createElement("span", {style:s.histDate}, r.date),
                React.createElement("span", {style:s.histTotal}, `合計 ${Object.values(r.counts).reduce((a,b)=>a+b,0)}`),
                React.createElement("button", {style:s.delBtn, onClick:()=>deleteRecord(r.date)}, "削除")
              ),
              React.createElement("div", {style:s.histGrid},
                ITEMS.map(item =>
                  React.createElement("div", {key:item.key, style:s.histItem},
                    React.createElement("span", {style:{...s.histDot, background:COLORS[item.key]}}),
                    React.createElement("span", {style:s.histLabel}, item.label),
                    React.createElement("span", {style:s.histVal}, r.counts[item.key]||0)
                  )
                )
              )
            )
          )
        )
      );
    }
    const styles = {
      app: { fontFamily: "'Hiragino Sans','Noto Sans JP',sans-serif", background:"#f7f8fc", minHeight:"100vh" },
      loading: { display:"flex", justifyContent:"center", alignItems:"center", height:"100vh" },
      header: { background:"#fff", padding:"16px 16px 0", boxShadow:"0 2px 12px rgba(0,0,0,0.06)", position:"sticky", top:0, zIndex:10 },
      headerTitle: { fontSize:18, fontWeight:700, color:"#222", marginBottom:12 },
      tabs: { display:"flex", gap:4 },
      tab: { flex:1, padding:"10px 0", border:"none", background:"transparent", color:"#888", fontSize:14, cursor:"pointer", borderBottom:"3px solid transparent" },
      tabActive: { flex:1, padding:"10px 0", border:"none", background:"transparent", color:"#FF6B6B", fontSize:14, fontWeight:700, cursor:"pointer", borderBottom:"3px solid #FF6B6B" },
      content: { padding:"16px 12px 80px" },
      dateRow: { display:"flex", alignItems:"center", gap:8, marginBottom:12 },
      arrowBtn: { width:36, height:36, borderRadius:10, border:"1.5px solid #ddd", background:"#fff", fontSize:20, cursor:"pointer" },
      dateInput: { flex:1, padding:"8px 12px", borderRadius:10, border:"1.5px solid #ddd", fontSize:15, background:"#fff" },
      totalBadge: { textAlign:"center", fontSize:16, color:"#888", marginBottom:16 },
      totalNum: { fontSize:32, fontWeight:800, color:"#FF6B6B", marginLeft:4 },
      grid: { display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:10, marginBottom:20 },
      card: { background:"#fff", borderRadius:14, overflow:"hidden", boxShadow:"0 2px 10px rgba(0,0,0,0.06)", display:"flex", flexDirection:"column", alignItems:"center" },
      cardAccent: { width:"100%", height:4 },
      cardCountInput: { fontSize:28, fontWeight:800, color:"#333", width:"80%", textAlign:"center", border:"none", outline:"none", padding:"12px 0 6px", background:"transparent", marginTop:8 },
      cardLabel: { fontSize:11, color:"#777", marginBottom:12, textAlign:"center", padding:"0 4px", minHeight:30, display:"flex", alignItems:"center", justifyContent:"center" },
      actionRow: { display:"flex", gap:12, marginTop:8 },
      resetBtn: { flex:1, padding:"14px 0", borderRadius:12, border:"1.5px solid #ddd", background:"#fff", color:"#888", fontSize:15, cursor:"pointer" },
      saveBtn: { flex:2, padding:"14px 0", borderRadius:12, border:"none", background:"linear-gradient(135deg,#FF6B6B,#FF8E53)", color:"#fff", fontSize:15, fontWeight:700, cursor:"pointer" },
      sectionTitle: { fontSize:15, fontWeight:700, color:"#444", marginBottom:12, marginTop:8 },
      itemSelector: { display:"flex", flexWrap:"wrap", gap:8, marginBottom:20 },
      itemChip: { padding:"6px 12px", borderRadius:20, border:"none", fontSize:12, cursor:"pointer", fontWeight:600 },
      chartWrap: { background:"#fff", borderRadius:16, padding:"16px 8px", boxShadow:"0 2px 10px rgba(0,0,0,0.06)", marginBottom:24 },
      emptyMsg: { textAlign:"center", color:"#aaa", fontSize:14, padding:"40px 0" },
      avgGrid: { display:"flex", flexDirection:"column", gap:8 },
      avgCard: { background:"#fff", borderRadius:12, padding:"10px 14px", boxShadow:"0 1px 6px rgba(0,0,0,0.05)", display:"flex", alignItems:"center", gap:10, position:"relative", overflow:"hidden" },
      avgBar: { position:"absolute", left:0, top:0, bottom:0, opacity:0.08 },
      avgLabel: { flex:1, fontSize:13, color:"#555", position:"relative" },
      avgNum: { fontSize:18, fontWeight:800, position:"relative" },
      histCard: { background:"#fff", borderRadius:14, padding:"14px", marginBottom:12, boxShadow:"0 2px 10px rgba(0,0,0,0.06)" },
      histHeader: { display:"flex", alignItems:"center", marginBottom:10 },
      histDate: { fontSize:15, fontWeight:700, color:"#333", flex:1 },
      histTotal: { fontSize:13, color:"#888", marginRight:12 },
      delBtn: { padding:"4px 10px", borderRadius:8, border:"1px solid #ffcdd2", background:"#fff5f5", color:"#FF6B6B", fontSize:12, cursor:"pointer" },
      histGrid: { display:"grid", gridTemplateColumns:"1fr 1fr", gap:6 },
      histItem: { display:"flex", alignItems:"center", gap:6 },
      histDot: { width:8, height:8, borderRadius:"50%", flexShrink:0 },
      histLabel: { fontSize:12, color:"#666", flex:1 },
      histVal: { fontSize:13, fontWeight:700, color:"#333" },
    };
    ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
    if ("serviceWorker" in navigator) { navigator.serviceWorker.register("sw.js"); }
  </script>
</body>
</html>
